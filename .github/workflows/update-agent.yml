name: Build Acronis Agent Docker Image and Release Installers

on:
  schedule:
    - cron: '0 3 * * *'   # каждый день в 03:00 UTC
  workflow_dispatch:      # ручной запуск
    inputs:
      force_version:
        description: 'Принудительная версия (например, 26.6.42659)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Список зеркал (можно переопределить здесь или через переменные)
  MIRRORS: "https://eu-cloud.acronis.com,https://us-cloud.acronis.com,https://au-cloud.acronis.com"

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # для создания релизов и загрузки assets
      packages: write        # для публикации Docker-образа

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install packaging

      - name: Get latest version and file list
        id: get_versions
        run: |
          export MIRRORS="${{ env.MIRRORS }}"
          python scripts/get_versions_and_assets.py --latest-only
          # Читаем LATEST_VERSION из вывода скрипта
          LATEST=$(grep '^LATEST_VERSION=' output.txt | cut -d= -f2)
          echo "version=$LATEST" >> $GITHUB_OUTPUT
          # Сохраняем список файлов для последующей загрузки
          echo "files<<EOF" >> $GITHUB_OUTPUT
          cat latest_files.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        # Сохраняем полный вывод в файл для отладки
        # (скрипт уже выводит всё в stdout, но мы можем перенаправить)

      - name: Read current stored Linux version
        id: current_version
        run: |
          if [ -f version.txt ]; then
            CURRENT=$(cat version.txt)
          else
            CURRENT=""
          fi
          echo "current=$CURRENT" >> $GITHUB_OUTPUT

      - name: Determine if update needed
        id: check
        run: |
          FORCE_VERSION="${{ github.event.inputs.force_version }}"
          if [ -n "$FORCE_VERSION" ]; then
            echo "Force version $FORCE_VERSION, forcing update"
            echo "new_version=true" >> $GITHUB_OUTPUT
            echo "version=$FORCE_VERSION" >> $GITHUB_OUTPUT
          elif [ "${{ steps.get_versions.outputs.version }}" != "${{ steps.current_version.outputs.current }}" ]; then
            echo "new_version=true" >> $GITHUB_OUTPUT
          else
            echo "new_version=false" >> $GITHUB_OUTPUT
          fi

      - name: Update version.txt and versions.json (if new)
        if: steps.check.outputs.new_version == 'true'
        run: |
          VERSION="${{ steps.check.outputs.version || steps.get_versions.outputs.version }}"
          echo "$VERSION" > version.txt
          # Запускаем скрипт для обновления versions.json (без --latest-only)
          export MIRRORS="${{ env.MIRRORS }}"
          python scripts/get_versions_and_assets.py
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add version.txt versions.json
          git commit -m "Update Acronis agent version to $VERSION (and history)"
          git push

      - name: Download all installer files for the new version
        if: steps.check.outputs.new_version == 'true'
        run: |
          mkdir -p installers
          VERSION="${{ steps.check.outputs.version || steps.get_versions.outputs.version }}"
          # Список файлов передаём из предыдущего шага
          echo "${{ steps.get_versions.outputs.files }}" | while read -r fname; do
            if [ -z "$fname" ]; then continue; fi
            # Пытаемся скачать с первого зеркала, где файл есть (скрипт уже определил наличие)
            # Для простоты скачаем с первого зеркала из списка, но если его там нет – попробуем другие
            for mirror in $(echo "${{ env.MIRRORS }}" | tr ',' ' '); do
              url="$mirror/download/u/baas/4.0/$VERSION/$fname"
              echo "Trying to download $url"
              if curl -L --fail -o "installers/$fname" "$url"; then
                echo "Downloaded $fname"
                break
              else
                echo "Not found on $mirror, trying next..."
              fi
            done
          done

      - name: Create GitHub Release and upload assets
        if: steps.check.outputs.new_version == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.check.outputs.version || steps.get_versions.outputs.version }}
          name: Acronis Agent ${{ steps.check.outputs.version || steps.get_versions.outputs.version }}
          draft: false
          prerelease: false
          files: installers/*
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to container registry
        if: steps.check.outputs.new_version == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.check.outputs.new_version == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.check.outputs.version || steps.get_versions.outputs.version }}
          build-args: |
            AGENT_VERSION=${{ steps.check.outputs.version || steps.get_versions.outputs.version }}
