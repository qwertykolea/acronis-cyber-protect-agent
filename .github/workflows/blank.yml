name: Update Acronis Agent

on:
  schedule:
    - cron: '0 2 * * *'   # каждый день в 02:00 UTC
  workflow_dispatch:      # ручной запуск

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install packaging

      - name: Get latest version and full history
        id: get_versions
        run: |
          # Можно передать список зеркал через переменную окружения MIRRORS
          # Если не задана, скрипт использует DEFAULT_MIRRORS
          export MIRRORS="https://eu-cloud.acronis.com,https://us-cloud.acronis.com,https://au-cloud.acronis.com"
          python scripts/get_versions.py --os linux --output versions.json > output.txt
          # Извлекаем LATEST_VERSION
          LATEST=$(grep '^LATEST_VERSION=' output.txt | cut -d= -f2)
          echo "version=$LATEST" >> $GITHUB_OUTPUT
          # Сохраняем весь вывод для отладки (необязательно)
          cat output.txt

      - name: Read current stored Linux version
        id: current_version
        run: |
          if [ -f version.txt ]; then
            CURRENT=$(cat version.txt)
          else
            CURRENT=""
          fi
          echo "current=$CURRENT" >> $GITHUB_OUTPUT

      - name: Check if new version
        id: check
        run: |
          if [ "${{ steps.get_versions.outputs.version }}" != "${{ steps.current_version.outputs.current }}" ]; then
            echo "new_version=true" >> $GITHUB_OUTPUT
          else
            echo "new_version=false" >> $GITHUB_OUTPUT
          fi

      - name: Update version.txt and versions.json (if new)
        if: steps.check.outputs.new_version == 'true'
        run: |
          echo "${{ steps.get_versions.outputs.version }}" > version.txt
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add version.txt versions.json
          git commit -m "Update Acronis agent version to ${{ steps.get_versions.outputs.version }} (and history)"
          git push

      - name: Log in to container registry
        if: steps.check.outputs.new_version == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.check.outputs.new_version == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.get_versions.outputs.version }}
          build-args: |
            AGENT_VERSION=${{ steps.get_versions.outputs.version }}
